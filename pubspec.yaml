name: fintracker
description: Gravity Fintracker — Privacy-first, quantum-encrypted expense tracker by Team Antigravity.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.1.0+2

environment:
  sdk: '>=3.10.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  path: any

  cupertino_icons: ^1.0.2
  intl: ^0.20.2
  sqflite: ^2.2.8+2
  flutter_speed_dial: ^6.2.0
  events_emitter: ^0.5.2
  sqflite_common_ffi: ^2.2.5
  flutter_bloc: ^8.1.3
  shared_preferences: ^2.1.1
  currency_picker: ^2.0.16
  material_symbols_icons: ^4.2951.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  file_picker: ^8.0.0+1

  # Charts & Visualizations
  fl_chart: ^0.66.0

  # Security & Privacy
  local_auth: ^2.1.0
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3

  # Export
  csv: ^5.1.1

  # UI & Typography
  google_fonts: ^6.1.0

  # Crypto (quantum-resistant HKDF-SHA512)
  crypto: ^3.0.3
  pqcrypto: ^0.4.0
  cryptography: ^2.9.0

  # Utilities
  uuid: ^3.0.7

  # Notifications
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.4

  # AI / Input
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  speech_to_text: ^7.0.0

  # Desktop
  system_tray: ^2.0.0
  window_manager: ^0.3.9
  supabase_flutter: ^2.16.0
  purchases_flutter: ^10.4.1
  flutter_animate: ^4.5.2
  package_info_plus: ^9.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:


  uses-material-design: true


  assets:
    - assets/currencies.json

